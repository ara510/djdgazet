<section class="container-news py-12 max-w-2xl">
  <div class="text-center mb-8">
    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-gazety-red mb-2">
      {{ i18n.isFrench() ? 'Contact' : 'Contact' }}
    </p>
    <h1 class="font-display font-black text-3xl md:text-4xl text-gazety-dark">
      {{ i18n.isFrench() ? 'Écrivez-nous' : 'Get in touch' }}
    </h1>
    <p class="text-silver-600 mt-3">
      {{ i18n.isFrench()
        ? 'Une question, une suggestion ou un partenariat ? Envoyez-nous un message.'
        : 'A question, a suggestion or a partnership? Send us a message.' }}
    </p>
  </div>

  <form (submit)="$event.preventDefault(); onSubmit()" class="space-y-4 bg-white border border-silver-200 rounded-sm p-6 md:p-8">
    <div>
      <label class="block text-xs font-semibold text-gazety-dark mb-1.5">{{ i18n.isFrench() ? 'Nom complet' : 'Full name' }}</label>
      <input
        type="text"
        [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" required
        class="w-full px-4 py-2.5 border border-silver-300 rounded-sm focus:outline-none focus:border-gazety-red text-sm"
        [placeholder]="i18n.isFrench() ? 'Votre nom' : 'Your name'"
      />
    </div>
    <div>
      <label class="block text-xs font-semibold text-gazety-dark mb-1.5">Email</label>
      <input
        type="email"
        [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required
        class="w-full px-4 py-2.5 border border-silver-300 rounded-sm focus:outline-none focus:border-gazety-red text-sm"
        placeholder="vous@exemple.mg"
      />
    </div>
    <div>
      <label class="block text-xs font-semibold text-gazety-dark mb-1.5">Message</label>
      <textarea
        [ngModel]="message()" (ngModelChange)="message.set($event)" name="message" required rows="6"
        class="w-full px-4 py-2.5 border border-silver-300 rounded-sm focus:outline-none focus:border-gazety-red text-sm resize-y"
        [placeholder]="i18n.isFrench() ? 'Votre message…' : 'Your message…'"
      ></textarea>
    </div>
    <button type="submit" class="w-full btn-primary py-3 text-base disabled:opacity-60" [disabled]="loading()">
      {{ loading()
        ? (i18n.isFrench() ? 'Envoi…' : 'Sending…')
        : (i18n.isFrench() ? 'Envoyer le message' : 'Send message') }}
    </button>
  </form>
</section>
